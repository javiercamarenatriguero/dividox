name: Distribute Android (Reusable)

on:
  workflow_call:
    inputs:
      build_number:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      release_notes:
        required: false
        type: string
        default: ""
    secrets:
      FIREBASE_APP_ID_ANDROID:
        required: true
      FIREBASE_TOKEN:
        required: true

jobs:
  distribute-android:
    name: Distribute Android
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: internal-testers
          file: composeApp-debug.apk
          releaseNotes: ${{ inputs.release_notes != '' && inputs.release_notes || format('Build #{0} from {1}', inputs.build_number, inputs.commit_sha) }}
