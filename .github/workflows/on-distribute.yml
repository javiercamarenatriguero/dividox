name: On Distribute

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build and distribute
        required: true
        default: main
      release_notes:
        description: Release notes (optional)
        required: false
        default: ""

jobs:
  prepare:
    name: Compute Build Number
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.build_number.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Compute build number
        id: build_number
        run: echo "value=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

  build:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p gradle/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > gradle/keystore/release.jks
          chmod 600 gradle/keystore/release.jks

      - name: Build Android
        run: ./gradlew :composeApp:assembleRelease -PbuildNumber=${{ needs.prepare.outputs.build_number }}

      - name: Prepare APK
        run: cp composeApp/build/outputs/apk/release/*.apk composeApp-release.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp-release.apk
          retention-days: 1

  distribute-android:
    name: Distribute Android
    needs: [prepare, build]
    uses: ./.github/workflows/distribute-android-action.yml
    with:
      build_number: ${{ needs.prepare.outputs.build_number }}
      commit_sha: ${{ github.sha }}
      release_notes: ${{ inputs.release_notes != '' && inputs.release_notes || format('[{0}] Build {1}', inputs.branch, needs.prepare.outputs.build_number) }}
    secrets:
      FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  distribute-desktop:
    name: Distribute Desktop
    needs: [prepare, build]
    uses: ./.github/workflows/distribute-desktop-action.yml
    with:
      build_number: ${{ needs.prepare.outputs.build_number }}
      tag: "${{ inputs.branch }}-build-${{ needs.prepare.outputs.build_number }}"
      release_notes: ${{ inputs.release_notes != '' && inputs.release_notes || format('[{0}] Build {1}', inputs.branch, needs.prepare.outputs.build_number) }}
    secrets:
      FIREBASE_APPLICATION_ID: ${{ secrets.FIREBASE_DESKTOP_APPLICATION_ID }}
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_DESKTOP_API_KEY }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_DESKTOP_PROJECT_ID }}
      FIREBASE_GCM_SENDER_ID: ${{ secrets.FIREBASE_DESKTOP_GCM_SENDER_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_DESKTOP_STORAGE_BUCKET }}
