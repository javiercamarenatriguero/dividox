name: Distribute Desktop (Reusable)

on:
  workflow_call:
    inputs:
      build_number:
        required: true
        type: string
      release_notes:
        required: false
        type: string
        default: ""
      tag:
        required: true
        type: string

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Package DMG
        run: ./gradlew :composeApp:packageDmg -PbuildNumber=${{ inputs.build_number }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          retention-days: 1

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Package DEB
        run: ./gradlew :composeApp:packageDeb -PbuildNumber=${{ inputs.build_number }}

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb
          retention-days: 1

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux]
    permissions:
      contents: write
    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: desktop-dmg
          path: dist/

      - name: Download DEB
        uses: actions/download-artifact@v4
        with:
          name: desktop-deb
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "Dividox ${{ inputs.tag }}"
          body: ${{ inputs.release_notes }}
          files: dist/*
          prerelease: true
